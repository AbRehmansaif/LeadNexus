{% extends "base.html" %}
{% block title %}Create Campaign — LeadNexus{% endblock %}

{% block content %}
<div class="page-header">
    <div class="header-flex">
        <div class="header-main">
            <h1 class="page-title"><i data-lucide="mail-plus" style="width:25px; height:25px; color: var(--accent-purple);"></i> New Growth Campaign</h1>
            <p class="page-subtitle">Configure your automated sequence and high conversion delivery infrastructure.</p>
        </div>
        <div class="header-actions">
            <a href="{% url 'mail-dashboard' %}" class="btn btn-secondary btn-sm">← Back to Dashboard</a>
        </div>
    </div>
</div>

<div class="campaign-creation-container">
    <div class="card campaign-card">
<form id="campaignForm" class="scraper-form" novalidate>
{% include "mail/create_campaign_fields.html" %}
</form>

<script>
let followupCount = 0;

document.getElementById('addFollowupBtn').addEventListener('click', () => {
    followupCount++;
    const container = document.getElementById('followupContainer');
    const stepIdx = followupCount + 1;
    
    const followupHtml = `
        <div class="form-section followup-step" id="step_${stepIdx}" style="border-left: 3px solid var(--accent-purple); padding-left: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <h3 class="form-section-title" style="margin-bottom:0;"><i data-lucide="repeat" style="width:18px; height:18px;"></i> Step ${stepIdx}: Follow-up</h3>
                <button type="button" class="btn btn-secondary btn-sm" onclick="removeStep(${stepIdx})" style="color: var(--accent-red);">Remove Step</button>
            </div>
            
            <div class="form-group">
                <label class="form-label">Wait Days (After previous step)</label>
                <input type="number" class="form-control step-wait" value="3" min="1">
            </div>

            <div class="form-group">
                <label class="form-label">Subject Line</label>
                <input type="text" class="form-control step-subject" placeholder="Re: ${document.getElementById('subject').value || 'Previous Message'}">
            </div>

            <div class="form-group">
                <label class="form-label">Follow-up Payload</label>
                <textarea class="form-control step-body payload-area" placeholder="Just following up on my previous email..."></textarea>
            </div>

            <!-- A/B Testing Toggle Option for Follow-up -->
            <div style="margin-top: 15px;">
                <button type="button" class="btn btn-secondary btn-sm" onclick="this.style.display='none'; this.nextElementSibling.style.display='block'; lucide.createIcons();" style="background: rgba(59,130,246, 0.1); border: 1px dashed var(--accent-blue); color: var(--accent-blue);">
                    <i data-lucide="layers" style="width:14px;height:14px;margin-right:6px;"></i> Add Step ${stepIdx} A/B Variant
                </button>
                <div class="ab-testing-box" style="display: none; margin-top: 15px; padding: 12px; background: rgba(59,130,246,0.03); border-radius: 8px; border: 1px dashed rgba(59,130,246,0.2); position: relative;">
                    <!-- Close button -->
                    <button type="button" class="btn" onclick="this.closest('.ab-testing-box').style.display='none'; this.closest('.ab-testing-box').previousElementSibling.style.display='inline-flex'; this.closest('.ab-testing-box').querySelectorAll('input, textarea').forEach(el=>el.value='');" style="position: absolute; top: 10px; right: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 6px; padding: 4px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center;" title="Remove A/B Variant">
                        <i data-lucide="x" style="width: 12px; height: 12px;"></i>
                    </button>
                    
                    <h4 style="font-size: 0.75rem; margin-top: 0; margin-bottom: 10px; color: var(--accent-blue); display: flex; align-items: center; gap: 6px;">
                        <i data-lucide="layers" style="width:12px; height:12px;"></i> Step ${stepIdx} A/B Variant
                    </h4>
                    <div class="form-group">
                        <label class="form-label" style="font-size: 0.7rem;">Variant B Subject</label>
                        <input type="text" class="form-control step-subject-b" placeholder="Test a different follow-up hook...">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label class="form-label" style="font-size: 0.7rem;">Variant B Payload</label>
                        <textarea class="form-control step-body-b payload-area" style="min-height: 80px;" placeholder="Try a different follow-up angle..."></textarea>
                    </div>
                </div>
            </div>
        </div>
    `;
    
    const div = document.createElement('div');
    div.innerHTML = followupHtml;
    container.appendChild(div);
    lucide.createIcons();
});

function removeStep(idx) {
    document.getElementById(`step_${idx}`).remove();
}

document.getElementById('campaignForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // 1. Reset Errors
    document.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
    
    // 2. Validate Primary Fields
    const name = document.getElementById('name');
    const subject = document.getElementById('subject');
    const body = document.getElementById('body');
    const csvFile = document.getElementById('csv_file').files[0];
    const manualInput = document.getElementById('manual_recipients');
    
    let isValid = true;
    if (!name.value.trim()) { name.classList.add('is-invalid'); isValid = false; }
    if (!subject.value.trim()) { subject.classList.add('is-invalid'); isValid = false; }
    if (!body.value.trim()) { body.classList.add('is-invalid'); isValid = false; }
    
    const hasLeads = !!csvFile || !!manualInput.value.trim();
    if (!hasLeads) {
        document.getElementById('csvDropArea').classList.add('is-invalid');
        manualInput.classList.add('is-invalid');
        isValid = false;
    }
    
    if (!isValid) {
        showNotification('Mission blocked: Please complete all mandatory protocol fields.', 'error');
        return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerHTML = 'Deploying Sequence...';

    const formData = new FormData();
    formData.append('name', name.value);
    formData.append('subject', subject.value);
    formData.append('body', body.value);
    formData.append('gap_seconds', document.getElementById('gap_seconds').value);

    // Collect Sequences
    const steps = [];
    // Add Step 1 (Implicitly index 1)
    steps.push({ 
        step_number: 1, 
        wait_days: 0, 
        subject: subject.value, 
        body: body.value,
        subject_b: document.getElementById('subject_b').value || null,
        body_b: document.getElementById('body_b').value || null
    });
    
    document.querySelectorAll('.followup-step').forEach((el, index) => {
        steps.push({
            step_number: index + 2,
            wait_days: el.querySelector('.step-wait').value,
            subject: el.querySelector('.step-subject').value,
            body: el.querySelector('.step-body').value,
            subject_b: el.querySelector('.step-subject-b').value || null,
            body_b: el.querySelector('.step-body-b').value || null
        });
    });
    formData.append('steps', JSON.stringify(steps));

    // Business Hours are now managed automatically via Profile Settings.


    if (csvFile) formData.append('csv_file', csvFile);
    if (manualInput.value.trim()) {
        const recipients = manualInput.value.split('\n').map(line => {
            const parts = line.split(',').map(s => s.trim());
            return { email: parts[0], name: parts[1] || '', custom_data: {} };
        }).filter(r => r.email);
        formData.append('recipients', JSON.stringify(recipients));
    }

    const scheduledAtInput = document.getElementById('scheduled_at');
    if (scheduledAtInput && scheduledAtInput.value) {
        // Convert local time to UTC ISO string for robust cross-timezone scheduling
        const utcDate = new Date(scheduledAtInput.value).toISOString();
        formData.append('scheduled_at', utcDate);
        formData.append('status', 'scheduled');
    }

    try {
        const response = await fetch('/mail/api/campaigns/create_with_recipients/', {
            method: 'POST',
            body: formData,
            headers: { 'X-CSRFToken': '{{ csrf_token }}' }
        });

        if (response.ok) {
            const data = await response.json();
            
            // ONLY trigger immediately if it's NOT a scheduled campaign
            if (data.status !== 'scheduled') {
                await fetch(`/mail/api/campaigns/${data.id}/trigger_step/`, {
                    method: 'POST',
                    body: JSON.stringify({ step_number: 1 }),
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' }
                });
            }
            
            window.location.href = `/mail/campaign/${data.id}/`;
        } else {
            const errorData = await response.json();
            showNotification(errorData.error || 'Sequence deployment failed.', 'error');
        }
    } catch (err) {
        showNotification('Network error: ' + err.message, 'error');
    } finally {
        btn.disabled = false;
        btn.innerHTML = 'Launch Campaign Sequence';
    }
});

// Auto-populate leads if passed from Scraper
document.addEventListener('DOMContentLoaded', () => {
    const leadsString = sessionStorage.getItem('pending_campaign_leads');
    const suggestedName = sessionStorage.getItem('pending_campaign_name');

    if (suggestedName) {
        const nameInput = document.getElementById('name');
        if (nameInput) {
            nameInput.value = suggestedName;
            sessionStorage.removeItem('pending_campaign_name');
        }
    }

    if (leadsString) {
        const manualInput = document.getElementById('manual_recipients');
        if (manualInput) {
            manualInput.value = leadsString;
            sessionStorage.removeItem('pending_campaign_leads');
            
            // Show a small notification
            const leadCount = leadsString.split('\n').filter(l => l.trim()).length;
            if (typeof showNotification === 'function') {
                showNotification(`Imported ${leadCount} leads from your recent search!`, 'success');
            }
        }
    }
});

// Real-time error clearing
document.querySelectorAll('.form-control, .file-input').forEach(input => {
    input.addEventListener('input', () => {
        input.classList.remove('is-invalid');
        // Handle specialized containers
        if (input.id === 'csv_file') {
            const dropArea = document.getElementById('csvDropArea');
            const manualArea = document.getElementById('manual_recipients');
            if (dropArea) dropArea.classList.remove('is-invalid');
            if (manualArea) manualArea.classList.remove('is-invalid');
        }
        if (input.id === 'manual_recipients') {
            const dropArea = document.getElementById('csvDropArea');
            if (dropArea) dropArea.classList.remove('is-invalid');
            input.classList.remove('is-invalid');
        }
    });
});

// Update file upload UI
document.getElementById('csv_file').addEventListener('change', function(e) {
    const fileName = e.target.files[0]?.name;
    if (fileName) {
        const dummy = document.querySelector('.file-dummy span');
        if (dummy) dummy.textContent = 'Selected: ' + fileName;
    }
});

// Auto-open date picker when clicking anywhere on the input field
const scheduledAtInput = document.getElementById('scheduled_at');
if (scheduledAtInput) {
    scheduledAtInput.addEventListener('click', function() {
        if (typeof this.showPicker === 'function') {
            try { this.showPicker(); } catch (e) { console.error(e); }
        } else {
            // Fallback for older browsers
            this.focus();
        }
    });
}
</script>
{% endblock %}
