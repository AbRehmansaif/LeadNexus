{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restore Security — LeadNexus Portal</title>
    <link rel="icon" href="{% static 'logo_svg.png' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --auth-bg: #020617;
            --brand-primary: #8b5cf6;
            --brand-secondary: #3b82f6;
            --p-rgb: 139, 92, 246;
            --s-rgb: 59, 130, 246;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--auth-bg);
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        /* ── Background ──────────────────────────────────── */
        .bg-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 1200px; height: 1200px;
            background: radial-gradient(circle, rgba(var(--p-rgb), 0.1) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }

        .bg-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            z-index: 0;
        }

        /* ── Card ────────────────────────────────────────── */
        .auth-card {
            width: 100%; max-width: 460px; position: relative; z-index: 10;
            background: var(--glass-bg); padding: 40px;
            border-radius: 28px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(30px);
            box-shadow: 0 25px 80px -12px rgba(0, 0, 0, 0.6);
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
        }

        .key-icon {
            width: 64px; height: 64px;
            background: rgba(var(--s-rgb), 0.1);
            border: 1px solid rgba(var(--s-rgb), 0.2);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            color: #3b82f6;
            margin: 0 auto 32px;
        }

        .brand-logo { height: 44px; margin-bottom: 32px; filter: drop-shadow(0 0 15px rgba(var(--p-rgb), 0.4)); }

        .form-header h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em; }
        .form-header p { color: var(--text-dim); font-size: 0.95rem; margin-bottom: 32px; }

        .input-group { margin-bottom: 24px; text-align: left; }
        .input-group label {
            display: block; font-size: 0.7rem; font-weight: 800;
            color: var(--text-muted); margin-bottom: 8px;
            text-transform: uppercase; letter-spacing: 0.12em;
        }

        .input-wrapper { position: relative; }
        .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #475569; }

        .auth-input {
            width: 100%; height: 50px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px; padding: 0 16px 0 44px;
            color: #fff; font-size: 0.95rem; transition: all 0.3s;
        }

        .auth-input:focus {
            outline: none; border-color: var(--brand-primary);
            background: rgba(var(--p-rgb), 0.05);
            box-shadow: 0 0 0 4px rgba(var(--p-rgb), 0.1);
        }

        .submit-btn {
            width: 100%; height: 54px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            border: none; border-radius: 12px;
            color: #fff; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: all 0.4s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 10px 30px -5px rgba(var(--p-rgb), 0.4);
            margin-top: 12px;
        }

        .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5; padding: 12px; border-radius: 12px;
            font-size: 0.85rem; margin-bottom: 24px;
            display: flex; align-items: center; gap: 10px;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 540px) {
            .auth-card { border-radius: 0; border: none; padding: 40px 24px; background: transparent; box-shadow: none; backdrop-filter: none; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-grid"></div>

    <div class="auth-card">
        <img src="{% static 'logo.png' %}" alt="LeadNexus Logo" class="brand-logo">
        
        <div class="key-icon">
            <i data-lucide="key-round" style="width: 32px; height: 32px;"></i>
        </div>

        <div class="form-header">
            <h2>New Credentials</h2>
            <p>Define your new operational security key to restore terminal access.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="error-msg">
                    <i data-lucide="octagon-alert" style="width: 16px; height: 16px;"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label>New Security Key</label>
                <div class="input-wrapper">
                    <i data-lucide="lock" class="input-icon" style="width: 18px; height: 18px;"></i>
                    <input type="password" name="password" class="auth-input" placeholder="••••••••" required autofocus>
                </div>
            </div>

            <div class="input-group">
                <label>Confirm Identity Key</label>
                <div class="input-wrapper">
                    <i data-lucide="shield-check" class="input-icon" style="width: 18px; height: 18px;"></i>
                    <input type="password" name="confirm_password" class="auth-input" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span>Reset Identity</span>
                <i data-lucide="refresh-cw" style="width: 20px; height: 20px;"></i>
            </button>
        </form>
    </div>

    <script>
        lucide.createIcons();
        const form = document.querySelector('form');
        if (form) {
            form.addEventListener('submit', () => {
                const btn = document.getElementById('submitBtn');
                if (btn) {
                    btn.innerHTML = '<span>Activating...</span>';
                    btn.style.opacity = '0.8';
                    btn.style.pointerEvents = 'none';
                }
            });
        }
    </script>
</body>
</html>
