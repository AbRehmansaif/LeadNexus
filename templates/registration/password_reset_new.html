{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restore Security — LeadNexus Portal</title>
    <link rel="icon" href="{% static 'logo_svg.png' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --auth-bg: #030712;
            --brand-primary: #8b5cf6;
            --glass-bg: rgba(15, 23, 42, 0.6);
            --text-dim: #94a3b8;
        }

        body {
            height: 100vh;
            margin: 0;
            padding: 0;
            background: var(--auth-bg);
            font-family: 'Outfit', 'Inter', sans-serif;
            color: #fff;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Neural Cursor ────────────────────────────────── */
        .cursor-dot, .cursor-outline {
            pointer-events: none;
            position: fixed;
            top: 0; left: 0;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            z-index: 9999;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .cursor-dot {
            width: 8px;
            height: 8px;
            background: var(--brand-primary);
        }

        .cursor-outline {
            width: 40px;
            height: 40px;
            border: 2px solid rgba(139, 92, 246, 0.3);
        }

        @media (pointer: fine) {
            body, a, button, input {
                cursor: none !important;
            }
            body:hover .cursor-dot { opacity: 1; }
        }

        @media (pointer: coarse) {
            .cursor-dot, .cursor-outline { display: none; }
        }

        .cursor-hover .cursor-outline {
            transform: translate(-50%, -50%) scale(1.5);
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--brand-primary);
        }

        .cursor-click .cursor-outline {
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(139, 92, 246, 0.2);
        }

        .auth-card {
            width: 100%;
            max-width: 460px;
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(24px) saturate(180%);
            border-radius: 28px;
            padding: 48px;
            text-align: center;
            position: relative;
            animation: cardFade 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .auth-card::before {
            content: '';
            position: absolute;
            inset: -1px;
            border-radius: 28px;
            padding: 1px;
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.3), transparent, rgba(59, 130, 246, 0.3));
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask-composite: exclude;
            pointer-events: none;
        }

        .key-icon {
            width: 64px;
            height: 64px;
            background: rgba(59, 130, 246, 0.1);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #3b82f6;
            margin: 0 auto 32px;
        }

        .form-header h2 {
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }

        .form-header p {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 24px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 8px;
        }

        .auth-input {
            width: 100%;
            height: 56px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 0 16px 0 44px;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .auth-input:focus {
            outline: none;
            border-color: var(--brand-primary);
            background: rgba(139, 92, 246, 0.05);
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #475569;
        }

        .submit-btn {
            width: 100%;
            height: 60px;
            background: var(--brand-primary);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 20px -5px rgba(139, 92, 246, 0.4);
            margin-top: 12px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            background: #7c3aed;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 24px;
        }

        @keyframes cardFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="key-icon">
            <i data-lucide="key-round" style="width: 32px; height: 32px;"></i>
        </div>

        <div class="form-header">
            <h2>New Credentials</h2>
            <p>Define your new operational security key to restore terminal access.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="error-msg">
                    <i data-lucide="octagon-alert" style="width: 16px; height: 16px; display: inline-block; vertical-align: middle;"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="input-group">
                <label>New Security Key</label>
                <div class="input-wrapper">
                    <i data-lucide="lock" class="input-icon" style="width: 18px; height: 18px;"></i>
                    <input type="password" name="password" class="auth-input" placeholder="••••••••" required autofocus>
                </div>
            </div>

            <div class="input-group">
                <label>Confirm Identity Key</label>
                <div class="input-wrapper">
                    <i data-lucide="shield-check" class="input-icon" style="width: 18px; height: 18px;"></i>
                    <input type="password" name="confirm_password" class="auth-input" placeholder="••••••••" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">
                <span>Reset Identity</span>
                <i data-lucide="refresh-cw" style="width: 20px; height: 20px;"></i>
            </button>
        </form>
    </div>

    <script>
        lucide.createIcons();

        // Neural Cursor Logic
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');

        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;

            dot.style.left = `${posX}px`;
            dot.style.top = `${posY}px`;

            outline.animate({
                left: `${posX}px`,
                top: `${posY}px`
            }, { duration: 500, fill: "forwards" });
        });

        const hoverables = document.querySelectorAll('a, button, input');
        hoverables.forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
        });

        document.addEventListener('mousedown', () => document.body.classList.add('cursor-click'));
        document.addEventListener('mouseup', () => document.body.classList.remove('cursor-click'));
    </script>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
</body>
</html>
