{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restore Identity — LeadNexus</title>
    <link rel="icon" href="{% static 'logo_svg.png' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        :root {
            --login-bg: #05070a;
            --login-card: rgba(13, 17, 23, 0.7);
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--login-bg);
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        .bg-mesh {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
            filter: blur(60px);
            animation: bgShift 20s ease-in-out infinite alternate;
        }

        .bg-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        .login-card {
            width: 440px;
            background: var(--login-card);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
            animation: cardFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .brand-section { text-align: center; margin-bottom: 40px; }
        .brand-logo-img-large { height: 50px; filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.5)); }
        .brand-name { font-size: 1.75rem; font-weight: 800; background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
        .brand-tagline { color: #94a3b8; font-size: 0.875rem; font-weight: 500; }

        .form-label { display: block; margin-bottom: 8px; font-size: 0.8125rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
        .input-wrapper { position: relative; margin-bottom: 24px; }
        .input-wrapper input {
            width: 100%;
            height: 52px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0 16px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .input-wrapper input:focus { outline: none; border-color: var(--accent-purple); background: rgba(0, 0, 0, 0.5); box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15); }

        .submit-btn {
            width: 100%;
            height: 52px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
            display: flex;
            align-items: center; justify-content: center; gap: 10px;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(139, 92, 246, 0.5); }

        .messages { list-style: none; padding: 0; margin: 0 0 20px 0; text-align: center; }
        .message.error { color: #fca5a5; font-size: 0.875rem; }

        @media (pointer: fine) {
            body, a, button { cursor: none !important; }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>

    <div class="login-card">
        <div class="brand-section">
            <div class="brand-logo-container" style="margin-bottom: 20px;">
                <img src="{% static 'logo.png' %}" alt="LeadNexus Logo" class="brand-logo-img-large">
            </div>
            <h1 class="brand-name">New Protocol</h1>
            <p class="brand-tagline">Initialize your new security credentials</p>
        </div>

        {% if messages %}
        <ul class="messages">
            {% for message in messages %}
            <li class="message {{ message.tags }}">⚠️ {{ message }}</li>
            {% endfor %}
        </ul>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            
            <div class="input-wrapper">
                <label class="form-label">New Security Key</label>
                <input type="password" name="password" placeholder="••••••••" required autofocus>
            </div>

            <div class="input-wrapper">
                <label class="form-label">Confirm Security Key</label>
                <input type="password" name="confirm_password" placeholder="••••••••" required>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span>Restore Access</span>
                <span style="font-size: 1.2rem;">→</span>
            </button>
        </form>
    </div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <script>
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX; const posY = e.clientY;
            dot.style.left = `${posX}px`; dot.style.top = `${posY}px`;
            outline.animate({ left: `${posX}px`, top: `${posY}px` }, { duration: 500, fill: "forwards" });
        });
    </script>
</body>
</html>
