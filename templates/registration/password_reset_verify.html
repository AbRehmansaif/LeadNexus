{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Verification — LeadNexus Portal</title>
    <link rel="icon" href="{% static 'logo_svg.png' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --auth-bg: #020617;
            --brand-primary: #8b5cf6;
            --brand-secondary: #3b82f6;
            --p-rgb: 139, 92, 246;
            --s-rgb: 59, 130, 246;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--auth-bg);
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        /* ── Background ──────────────────────────────────── */
        .bg-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 1200px; height: 1200px;
            background: radial-gradient(circle, rgba(var(--p-rgb), 0.1) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }

        .bg-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            z-index: 0;
        }

        /* ── Card ────────────────────────────────────────── */
        .auth-card {
            width: 100%; max-width: 480px; position: relative; z-index: 10;
            background: var(--glass-bg); padding: 48px;
            border-radius: 28px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(30px);
            box-shadow: 0 25px 80px -12px rgba(0, 0, 0, 0.6);
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
        }

        .verify-icon {
            width: 80px; height: 80px;
            background: rgba(var(--p-rgb), 0.1);
            border: 1px solid rgba(var(--p-rgb), 0.2);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            color: var(--brand-primary);
            margin: 0 auto 32px;
            box-shadow: 0 0 30px rgba(var(--p-rgb), 0.2);
        }

        .brand-logo { height: 48px; margin-bottom: 32px; filter: drop-shadow(0 0 15px rgba(var(--p-rgb), 0.4)); }

        .form-header h2 { font-size: 2rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em; }
        .form-header p { color: var(--text-dim); font-size: 1.05rem; line-height: 1.6; margin-bottom: 40px; }

        .code-input {
            width: 100%; height: 72px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            color: #fff; font-size: 2.5rem; font-weight: 800;
            text-align: center; letter-spacing: 0.4em;
            transition: all 0.3s; margin-bottom: 32px;
        }

        .code-input:focus {
            outline: none; border-color: var(--brand-primary);
            background: rgba(var(--p-rgb), 0.05);
            box-shadow: 0 0 0 4px rgba(var(--p-rgb), 0.1);
        }

        .submit-btn {
            width: 100%; height: 56px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            border: none; border-radius: 12px;
            color: #fff; font-size: 1.15rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 10px 30px -5px rgba(var(--p-rgb), 0.4);
        }

        .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5; padding: 12px; border-radius: 12px;
            font-size: 0.85rem; margin-bottom: 24px;
            display: flex; align-items: center; gap: 10px;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 540px) {
            .auth-card { border-radius: 0; border: none; padding: 40px 24px; background: transparent; box-shadow: none; backdrop-filter: none; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-grid"></div>

    <div class="auth-card">
        <img src="{% static 'logo.png' %}" alt="LeadNexus Logo" class="brand-logo">
        
        <div class="verify-icon">
            <i data-lucide="mail-search" style="width: 40px; height: 40px;"></i>
        </div>

        <div class="form-header">
            <h2>Identity Verify</h2>
            <p>Verification protocol active. Check your relay for the 6-digit access code.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="error-msg">
                    <i data-lucide="octagon-alert" style="width: 16px; height: 16px;"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <input type="text" name="code" class="code-input" maxlength="6" placeholder="000000" pattern="\d{6}" required autofocus>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span>Confirm Identity</span>
                <i data-lucide="check-circle-2" style="width: 20px; height: 20px;"></i>
            </button>
        </form>

        <div style="margin-top: 32px; color: var(--text-dim); font-size: 0.9rem;">
            No code arrival? <a href="{% url 'password_reset' %}" style="color: #fff; text-decoration: none; font-weight: 700;">Request Redispatch</a>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
