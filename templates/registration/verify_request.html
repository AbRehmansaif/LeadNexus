{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Verification — LeadNexus</title>
    <link rel="icon" href="{% static 'logo_svg.png' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --auth-bg: #020617;
            --brand-primary: #8b5cf6;
            --brand-secondary: #3b82f6;
            --p-rgb: 139, 92, 246;
            --s-rgb: 59, 130, 246;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow-x: hidden;
            background: var(--auth-bg);
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        .bg-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 1200px; height: 1200px;
            background: radial-gradient(circle, rgba(var(--p-rgb), 0.1) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }

        .bg-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            z-index: 0;
        }

        .auth-card {
            width: 100%; max-width: 480px; position: relative; z-index: 10;
            background: var(--glass-bg); padding: 48px;
            border-radius: 28px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(30px);
            box-shadow: 0 25px 80px -12px rgba(0, 0, 0, 0.6);
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
        }

        .brand-logo { height: 48px; margin-bottom: 32px; filter: drop-shadow(0 0 15px rgba(var(--p-rgb), 0.4)); }

        .form-header h2 { font-size: 2rem; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.02em; }
        .form-header p { color: var(--text-dim); font-size: 1rem; line-height: 1.6; margin-bottom: 40px; }

        .form-group { text-align: left; margin-bottom: 24px; position: relative; }
        .form-label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-dim); margin-bottom: 8px; margin-left: 4px; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .auth-input {
            width: 100%; height: 56px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 0 20px; color: #fff;
            transition: all 0.3s; font-size: 1rem;
        }

        .auth-input:focus { outline: none; border-color: var(--brand-primary); background: rgba(var(--p-rgb), 0.05); box-shadow: 0 0 0 4px rgba(var(--p-rgb), 0.1); }

        .submit-btn {
            width: 100%; height: 56px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            border: none; border-radius: 12px;
            color: #fff; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 10px 30px -5px rgba(var(--p-rgb), 0.4);
        }

        .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .info-msg { background: rgba(59, 130, 246, 0.1); color: #93c5fd; padding: 12px; border-radius: 12px; font-size: 0.85rem; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }

        @keyframes cardIn { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* ── Neural Cursor ────────────────────────────────── */
        .cursor-dot, .cursor-outline {
            pointer-events: none;
            position: fixed;
            top: 0; left: 0;
            border-radius: 50%;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease;
            will-change: transform;
        }

        .cursor-dot { width: 8px; height: 8px; background: var(--brand-primary); }
        .cursor-outline { width: 40px; height: 40px; border: 2px solid rgba(var(--p-rgb), 0.3); }

        @media (pointer: fine) {
            body, a, button, input, label {
                cursor: none !important;
            }
        }

        @media (pointer: coarse) {
            .cursor-dot, .cursor-outline { display: none; }
        }

        .cursor-hover .cursor-outline {
            transform: translate(-50%, -50%) scale(1.5);
            background: rgba(139, 92, 246, 0.1);
            border-color: var(--brand-primary);
        }

        .cursor-click .cursor-outline {
            transform: translate(-50%, -50%) scale(0.9);
            background: rgba(139, 92, 246, 0.2);
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-grid"></div>

    <div class="auth-card">
        <a href="{% url 'landing' %}">
            <img src="{% static 'logo.png' %}" alt="LeadNexus Logo" class="brand-logo">
        </a>

        <div class="form-header">
            <h2>Verify Identity</h2>
            <p>Locked out? Enter your registered email to receive a new activation key.</p>
        </div>

        {% if messages %}
            {% for message in messages %}
                <div class="info-msg">
                    <i data-lucide="info" style="width: 16px; height: 16px;"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">Operator Email</label>
                <input type="email" name="email" class="auth-input" placeholder="operator@leadnexus.pro" required autofocus>
            </div>

            <button type="submit" class="submit-btn">
                <span>Dispatch Code</span>
                <i data-lucide="send" style="width: 18px; height: 18px;"></i>
            </button>
        </form>

        <div style="margin-top: 32px; color: var(--text-dim); font-size: 0.9rem;">
            Remembered your access? <a href="{% url 'login' %}" style="color: #fff; text-decoration: none; font-weight: 700;">Back to Login</a>
        </div>
    </div>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <script>
        lucide.createIcons();

        // Neural Cursor Logic
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');

        if (dot && outline) {
            window.addEventListener('mousemove', (e) => {
                const posX = e.clientX;
                const posY = e.clientY;

                requestAnimationFrame(() => {
                    dot.style.transform = `translate3d(${posX}px, ${posY}px, 0) translate(-50%, -50%)`;
                    
                    outline.animate({
                        transform: `translate3d(${posX}px, ${posY}px, 0) translate(-50%, -50%)`
                    }, { duration: 100, fill: "forwards", easing: "ease-out" });
                    
                    if (dot.style.opacity === '0' || dot.style.opacity === '') {
                        dot.style.opacity = '1';
                        outline.style.opacity = '1';
                    }
                });
            });

            const hoverables = document.querySelectorAll('a, button, input');
            hoverables.forEach(el => {
                el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
                el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
            });

            document.addEventListener('mousedown', () => document.body.classList.add('cursor-click'));
            document.addEventListener('mouseup', () => document.body.classList.remove('cursor-click'));
        }
    </script>
</body>
</html>
