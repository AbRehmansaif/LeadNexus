{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identity Recovery — LeadNexus Reset</title>
    <link rel="icon" href="{% static 'logo_svg.png' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        :root {
            --login-bg: #05070a;
            --login-card: rgba(13, 17, 23, 0.7);
        }

        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--login-bg);
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* ── Dynamic AI Background ────────────────────────── */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(circle at 20% 30%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(6, 182, 212, 0.1) 0%, transparent 50%);
            filter: blur(60px);
            animation: bgShift 20s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.1) translate(20px, -20px); }
            100% { transform: scale(1) translate(-20px, 20px); }
        }

        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
        }

        /* ── Reset Card ───────────────────────────────────── */
        .login-card {
            width: 440px;
            background: var(--login-card);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
            animation: cardFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .brand-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .brand-logo-container {
            margin-bottom: 20px;
        }

        .brand-logo-img-large {
            height: 50px;
            filter: drop-shadow(0 0 10px rgba(139, 92, 246, 0.5));
        }

        .brand-name {
            font-size: 1.75rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .brand-tagline {
            color: #94a3b8;
            font-size: 0.875rem;
            font-weight: 500;
        }

        /* ── Form Styles ──────────────────────────────────── */
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8125rem;
            font-weight: 600;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 24px;
        }

        .input-wrapper input {
            width: 100%;
            height: 52px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0 16px;
            color: #fff;
            font-size: 0.95rem;
            transition: all 0.2s;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: var(--accent-purple);
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
        }

        .submit-btn {
            width: 100%;
            height: 52px;
            background: var(--gradient-primary);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 8px;
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(139, 92, 246, 0.5);
        }

        .footer-links {
            margin-top: 32px;
            text-align: center;
            font-size: 0.875rem;
            color: #94a3b8;
        }

        .footer-links a {
            color: var(--accent-purple);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .footer-links a:hover {
            color: #a78bfa;
            text-decoration: underline;
        }

        /* Allow default cursor on inputs for usability */
        input {
            cursor: auto !important;
        }
        
        @media (pointer: fine) {
            body, a, button {
                cursor: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-grid"></div>

    <div class="login-card">
        <div class="brand-section">
            <div class="brand-logo-container">
                <img src="{% static 'logo.png' %}" alt="LeadNexus Logo" class="brand-logo-img-large">
            </div>
            <h1 class="brand-name">Recovery Key</h1>
            <p class="brand-tagline">Enter your identity email to restore access</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div class="input-wrapper">
                <label class="form-label">Email Identity</label>
                {{ form.email }}
                {% if form.email.errors %}
                     {% for error in form.email.errors %}
                        <p style="color: #fca5a5; font-size: 0.8rem; margin-top: 8px;">⚠️ {{ error }}</p>
                     {% endfor %}
                {% endif %}
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">
                <span>Request Recovery</span>
                <span style="font-size: 1.2rem;">→</span>
            </button>
        </form>

        <div class="footer-links">
            Remembered your credentials? <a href="{% url 'login' %}">Access Portal</a>
        </div>
    </div>
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>
    <script>
        // Custom Neural Cursor Logic
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');

        window.addEventListener('mousemove', (e) => {
            const posX = e.clientX;
            const posY = e.clientY;

            dot.style.left = `${posX}px`;
            dot.style.top = `${posY}px`;

            outline.animate({
                left: `${posX}px`,
                top: `${posY}px`
            }, { duration: 500, fill: "forwards" });
        });

        // Hover effect for links and buttons
        const hoverables = document.querySelectorAll('a, button, input');
        hoverables.forEach(el => {
            el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
            el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
        });

        document.addEventListener('mousedown', () => document.body.classList.add('cursor-click'));
        document.addEventListener('mouseup', () => document.body.classList.remove('cursor-click'));
    </script>
</body>
</html>
