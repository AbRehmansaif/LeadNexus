{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Protocol Active — LeadNexus Portal</title>
    <link rel="icon" href="{% static 'logo_svg.png' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --auth-bg: #020617;
            --brand-primary: #8b5cf6;
            --brand-secondary: #3b82f6;
            --p-rgb: 139, 92, 246;
            --s-rgb: 59, 130, 246;
            --glass-bg: rgba(15, 23, 42, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--auth-bg);
            font-family: 'Outfit', sans-serif;
            color: #fff;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        /* ── Background ──────────────────────────────────── */
        .bg-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 1200px; height: 1200px;
            background: radial-gradient(circle, rgba(var(--p-rgb), 0.1) 0%, transparent 70%);
            z-index: 0; pointer-events: none;
        }

        .bg-grid {
            position: absolute; inset: 0;
            background-image: linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px;
            mask-image: radial-gradient(circle at center, black, transparent 80%);
            z-index: 0;
        }

        /* ── Card ────────────────────────────────────────── */
        .auth-card {
            width: 100%; max-width: 480px; position: relative; z-index: 10;
            background: var(--glass-bg); padding: 48px;
            border-radius: 24px; border: 1px solid var(--glass-border);
            backdrop-filter: blur(30px);
            box-shadow: 0 25px 80px -12px rgba(0, 0, 0, 0.6);
            animation: cardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            text-align: center;
        }

        .success-icon {
            width: 80px; height: 80px;
            background: rgba(var(--p-rgb), 0.1);
            border: 1px solid rgba(var(--p-rgb), 0.2);
            border-radius: 24px;
            display: flex; align-items: center; justify-content: center;
            color: var(--brand-primary);
            margin: 0 auto 32px;
            box-shadow: 0 0 30px rgba(var(--p-rgb), 0.2);
        }

        .brand-logo { height: 48px; margin-bottom: 32px; filter: drop-shadow(0 0 15px rgba(var(--p-rgb), 0.4)); }

        .auth-card h1 { font-size: 2rem; font-weight: 800; margin-bottom: 16px; letter-spacing: -0.02em; }
        .auth-card p { color: var(--text-dim); font-size: 1.05rem; line-height: 1.6; margin-bottom: 40px; }

        .submit-btn {
            width: 100%; height: 54px;
            background: linear-gradient(135deg, var(--brand-primary), var(--brand-secondary));
            border: none; border-radius: 12px;
            color: #fff; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 12px;
            box-shadow: 0 10px 30px -5px rgba(var(--p-rgb), 0.4);
            transition: all 0.3s;
        }

        .submit-btn:hover { transform: translateY(-2px); filter: brightness(1.1); }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @media (max-width: 540px) {
            .auth-card { border-radius: 0; border: none; padding: 40px 24px; background: transparent; box-shadow: none; backdrop-filter: none; }
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="bg-grid"></div>

    <div class="auth-card">
        <img src="{% static 'logo.png' %}" alt="LeadNexus Logo" class="brand-logo">
        
        <div class="success-icon">
            <i data-lucide="shield-check" style="width: 40px; height: 40px;"></i>
        </div>

        <h1>Identity Restored</h1>
        <p>
            Your security protocols have been reset successfully. Operational access is now fully restored.
        </p>

        <a href="{% url 'login' %}" class="submit-btn">
            <span>Login to Terminal</span>
            <i data-lucide="terminal" style="width: 20px; height: 20px;"></i>
        </a>

        <div style="margin-top: 32px; font-size: 0.7rem; color: #475569; letter-spacing: 0.15em; text-transform: uppercase; font-weight: 600;">
            Powered by <span style="color: var(--brand-primary); font-weight: 800;">Abdul Rehman</span>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
