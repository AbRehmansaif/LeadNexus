version: "3.9"

services:
  db:
    image: postgres:16
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    env_file:
      - .env

  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"

  web:
    build: .
    restart: always
    env_file:
      - .env
    expose:
      - "8000"
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - db
      - redis

  # Celery worker — processes email send tasks, reply checks, etc.
  celery_worker:
    build: .
    entrypoint: []
    command: celery -A scrapper worker -l info --concurrency=4
    restart: always
    env_file:
      - .env
    volumes:
      - ./media:/app/media
    depends_on:
      - db
      - redis
      - web

  # Celery beat — periodic scheduler
  celery_beat:
    build: .
    entrypoint: []
    command: celery -A scrapper beat -l info
    restart: always
    env_file:
      - .env
    volumes:
      - ./media:/app/media
    depends_on:
      - db
      - redis
      - web

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./staticfiles:/app/static
      - ./media:/app/media
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - web

volumes:
  postgres_data:
