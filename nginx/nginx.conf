limit_req_zone $binary_remote_addr zone=contact_limit:10m rate=10r/m;

server {
    listen 80;
    server_name getleadnexus.com www.getleadnexus.com;
    
    # Block suspicious user agents
    if ($http_user_agent ~* (curl|wget|python|guzzle|libwww|scrapy|nmap|nikto)) {
        return 403;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name getleadnexus.com www.getleadnexus.com;
    ssl_certificate /etc/letsencrypt/live/getleadnexus.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/getleadnexus.com/privkey.pem;

    client_max_body_size 100M;
    
    # Block suspicious user agents
    if ($http_user_agent ~* (curl|wget|python|guzzle|libwww|scrapy|nmap|nikto)) {
        return 403;
    }

    location /contact-us/submit/ {
        limit_req zone=contact_limit burst=5 nodelay;
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        alias /app/static/;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}